# ─────────────────────────────────────────────────────────────────────────────
#  Spidy Multi-Agent System — Master Configuration
#  Location: spidy_ai/config/settings.yaml
#  All values can be changed without touching Python code.
# ─────────────────────────────────────────────────────────────────────────────

# ── MT5 Connection (existing settings preserved) ──────────────────────────────
mt5:
  login:    0                                          # Fill in your MT5 login
  password: ""                                        # Fill in your MT5 password
  server:   "MetaQuotes-Demo"
  path:     "C:\\Program Files\\MetaTrader 5\\terminal64.exe"

# ── System ────────────────────────────────────────────────────────────────────
system:
  symbol:                EURUSD        # Primary trading pair
  mode:                  SIMULATION    # SIMULATION | LIVE
  poll_interval_seconds: 5             # DataEngineer fetch cadence (seconds)
  candle_lookback:       500           # Candles fetched per timeframe

# ── Symbols & Timeframes (legacy — used by spidy_ai modules) ─────────────────
symbols:
  - "EURUSD"
  - "GBPUSD"
  - "XAUUSD"
  - "BTCUSD"

timeframes:
  - "M1"
  - "M5"
  - "M15"
  - "H1"
  - "D1"

# ── Risk guardrails (RiskManagerAgent) ───────────────────────────────────────
risk:
  start_balance:            10000.0    # Reference balance for DD calculations
  max_daily_drawdown_pct:   0.03       # 3%  daily loss  → pause trading
  max_total_drawdown_pct:   0.10       # 10% total loss  → kill switch
  max_open_positions:       3          # Hard cap on simultaneous positions
  risk_per_trade_pct:       0.01       # 1% of balance risked per trade
  max_lot_size:             1.0        # Absolute lot size cap
  min_signal_confidence:    0.55       # Minimum Gemini confidence to trade
  max_drawdown_percent:     5.0        # Legacy key (kept for backward compat)
  risk_per_trade_percent:   1.0        # Legacy key (kept for backward compat)
  regime_veto:                         # Regimes where we never trade
    - VOLATILE

# ── Execution (ExecutorAgent) ─────────────────────────────────────────────────
execution:
  atr_sl_multiplier:    1.5            # SL distance  = ATR × this
  rr_ratio:             2.0            # TP distance  = SL × this  (2:1 R:R)
  trailing_atr_mult:    1.0            # Trail dist   = ATR × this
  staleness_atr_factor: 1.0            # Skip signal if price drifted > ATR×this
  slippage_pips:        3              # Allowed slippage on market orders
  magic_number:         20260101       # MT5 magic number for Spidy orders

# ── Bus Bridge (BusBridgeAgent → Socket.IO relay) ────────────────────────────
bridge:
  relay_url:           "http://127.0.0.1:5000/agent-event"  # Node relay POST endpoint
  post_timeout_seconds: 2.0           # Drop silently after this — never stall trading

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  dir: logs                            # Directory for agent log files

# ── Backtesting (run_backtest.py) ─────────────────────────────────────────────
backtesting:
  start_date:      "2024-01-01"
  end_date:        "2024-12-31"
  initial_balance: 10000.0
  commission_per_lot: 7.0              # USD commission per round-trip lot
