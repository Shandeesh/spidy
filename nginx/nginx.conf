worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # ── Rate Limiting ─────────────────────────────────────────────────────────
    # 15 requests/second per IP — prevents dashboard polling exhaustion
    limit_req_zone $binary_remote_addr zone=api_zone:10m rate=15r/s;
    # Stricter zone for write endpoints (trade, close, connect)
    limit_req_zone $binary_remote_addr zone=write_zone:10m rate=5r/s;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;
    server_tokens   off;   # Hide nginx version

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_types application/json text/plain;

    # ── Upstreams ─────────────────────────────────────────────────────────────
    upstream brain_backend {
        server brain:5001;
        keepalive 4;
    }

    # MT5 bridge runs natively on Windows host
    upstream bridge_backend {
        server host.docker.internal:8000;
        keepalive 4;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── Brain Server (AI/ML) ──────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name brain.spidy.local;   # Change to your actual domain

        ssl_certificate     /etc/nginx/certs/fullchain.pem;   # Let's Encrypt / self-signed
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            limit_req zone=api_zone burst=30 nodelay;
            proxy_pass         http://brain_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }

    # ── MT5 Bridge (Trading Backend) ─────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name api.spidy.local;    # Change to your actual domain

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Stricter rate limit on write endpoints
        location ~ ^/(trade|close_trade|close_all|connect|reload_strategy) {
            limit_req zone=write_zone burst=10 nodelay;
            proxy_pass       http://bridge_backend;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_read_timeout 30s;
        }

        location / {
            limit_req zone=api_zone burst=30 nodelay;
            proxy_pass       http://bridge_backend;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_read_timeout 60s;
        }
    }
}
